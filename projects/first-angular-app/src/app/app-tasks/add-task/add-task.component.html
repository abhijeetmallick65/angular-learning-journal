<div class="add-task-panel">
  <div class="panel-top">
    <div class="panel-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </div>
    <div>
      <h3 class="panel-heading">New Task</h3>
      <p class="panel-sub">Fill in the details to add a task</p>
    </div>
    <button class="close-btn" type="button" (click)="cancelTask()" title="Cancel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <form class="task-form" (ngSubmit)="addNewTask()">
    <div class="field">
      <label for="title">
        <span class="label-text">Title</span>
        <span class="label-required">*</span>
      </label>
      <input
        id="title"
        name="title"
        type="text"
        placeholder="What needs to be done?"
        required
        autocomplete="off"
        [(ngModel)]="enterTitle"
      />
    </div>

    <div class="field">
      <label for="summary">
        <span class="label-text">Summary</span>
        <span class="label-required">*</span>
      </label>
      <textarea
        id="summary"
        name="summary"
        rows="3"
        placeholder="Describe the task in more detail..."
        required
        [(ngModel)]="enterSummary"
      ></textarea>
    </div>

    <div class="field">
      <label for="dueDate">
        <span class="label-text">Due Date</span>
        <span class="label-required">*</span>
      </label>
      <input
        id="dueDate"
        name="dueDate"
        type="date"
        required
        [(ngModel)]="enterDate"
      />
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="cancelTask()">Cancel</button>
      <button type="submit" class="btn-submit">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Add Task
      </button>
    </div>
  </form>
</div>
