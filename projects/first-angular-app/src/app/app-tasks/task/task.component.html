<article class="task-card" [class.overdue]="isOverdue">
  <div class="card-accent"></div>

  <div class="card-top">
    <div class="card-badges">
      @if(isOverdue) {
        <span class="badge badge-rose">Overdue</span>
      } @else {
        <span class="badge badge-indigo">Active</span>
      }
    </div>
    <button class="complete-btn" (click)="onCompleteTask()" title="Mark complete">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </button>
  </div>

  <div class="card-body">
    <h3 class="task-title">{{ task.title }}</h3>
    <p class="task-summary">{{ task.summary }}</p>
  </div>

  <div class="card-footer">
    <div class="due-date" [class.overdue-date]="isOverdue">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <time>{{ task.dueDate | date: 'MMM d, yyyy' }}</time>
    </div>
    <button class="done-btn" (click)="onCompleteTask()">Mark done</button>
  </div>
</article>
